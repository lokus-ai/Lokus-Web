name: Deploy Website to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: [self-hosted, production]
    name: Deploy to Production Server

    steps:
      - name: Deploy Website to Production
        run: |
          echo "Starting website deployment to PRODUCTION server..."
          /opt/Lokus-Prod/scripts/deploy-website.sh
          echo "Production deployment complete!"

      - name: Health Check
        run: |
          echo "Running health check..."
          # Wait for container to be healthy
          for i in {1..30}; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' lokus-website 2>/dev/null || echo "unknown")
            echo "Attempt $i: Container health status: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "✓ Container is healthy!"
              # Also verify via nginx (actual traffic path)
              if curl -sf http://localhost:80 -H "Host: www.lokusmd.com" > /dev/null 2>&1; then
                echo "✓ Nginx routing works!"
                exit 0
              else
                echo "Warning: Nginx routing check failed, but container is healthy"
                exit 0
              fi
            fi
            sleep 5
          done
          echo "Health check failed after 30 attempts!"
          docker logs lokus-website --tail 50
          exit 1

      - name: Discord Notification
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "Website Deployment"
          description: |
            Deployed to production server
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            By: ${{ github.actor }}
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
